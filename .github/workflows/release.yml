name: release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: checkout-repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: generate-token
        uses: actions/create-github-app-token@v3
        id: app-token
        env:
          APP_ID_VAL: ${{ secrets.APP_ID }}
          APP_KEY_VAL: ${{ secrets.APP_PRIVATE_KEY }}
        if: env.APP_ID_VAL != '' && env.APP_KEY_VAL != ''
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: "LinearSwipe, homebrew-tap"

      - name: install-dependencies
        run: |
          npm install --no-save semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/exec

      - name: run-semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ steps.app-token.outputs.token || secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          npx semantic-release
